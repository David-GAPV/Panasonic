<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Login - Panasonic IDP</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f5f5;color:#333;display:flex;min-height:100vh;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.12);width:400px;overflow:hidden}
.login-header{background:#2D4285;padding:32px;text-align:center}
.login-header img{height:36px;margin-bottom:12px}
.login-header h1{color:#fff;font-size:20px;font-weight:300}
.login-body{padding:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:15px;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:#2D4285}
.btn-login{width:100%;padding:14px;background:#2D4285;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.3s}
.btn-login:hover{background:#1a2d5e}
.error{background:#ffebee;color:#c62828;padding:12px;border-radius:4px;margin-bottom:20px;font-size:14px;text-align:center}
.footer{text-align:center;padding:16px;color:#999;font-size:12px;border-top:1px solid #f0f0f0}
</style></head><body>
<div class="login-box">
<div class="login-header">
<img src="/static/images/Panasonic_whitetext.jpg" alt="Panasonic"><br>
<h1>Intelligent Document Processing</h1>
</div>
<div class="login-body">
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST" action="/login">
<div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div>
<div class="form-group"><label>Password</label><input type="password" name="password" required></div>
<button type="submit" class="btn-login">Sign In</button>
</form>
</div>
<div class="footer">Panasonic IDP System v1.0</div>
</div>
</body></html>
